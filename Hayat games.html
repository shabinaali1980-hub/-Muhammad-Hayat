<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayat Games - Advanced 2D Craft</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        h1 {
            color: #55ff55;
            text-shadow: 2px 2px #00aa00;
            margin-bottom: 5px;
        }

        .instructions {
            color: #aaa;
            margin-bottom: 15px;
            font-size: 14px;
        }

        /* Inventory / Hotbar */
        #palette {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            background: #2c2c2c;
            padding: 10px;
            border: 4px solid #555;
            border-radius: 4px;
        }

        .block-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .block-option {
            width: 45px;
            height: 45px;
            cursor: pointer;
            border: 3px solid #333;
            box-sizing: border-box;
            transition: transform 0.1s;
        }

        .block-option:hover {
            transform: scale(1.05);
        }

        .block-option.selected {
            border-color: #ffff55;
            box-shadow: 0 0 10px #ffff55;
        }

        .count {
            font-size: 11px;
            margin-top: 4px;
            color: #ffff55;
            font-weight: bold;
        }

        /* The Game Grid */
        #grid {
            display: grid;
            grid-template-columns: repeat(20, 35px);
            grid-template-rows: repeat(15, 35px);
            gap: 1px;
            background-color: #333;
            border: 5px solid #111;
            box-shadow: 0px 12px 30px rgba(0,0,0,0.7);
        }

        .cell {
            width: 35px;
            height: 35px;
            cursor: pointer;
            box-sizing: border-box;
        }

        /* Minecraft Textures & Gradients */
        .sky { background-color: #729eff; }
        .dirt { background: #866043; border: 1px solid #573d2a; }
        .grass { background: linear-gradient(to bottom, #5b8731 30%, #866043 30%); border: 1px solid #406020; }
        .stone { background: #737373; border: 1px solid #525252; }
        .wood { background: #a16e3b; border: 1px solid #704d29; }
        .planks { background: #b98957; border: 1px solid #8f6539; }
        .leaves { background: #3b7a24; border: 1px solid #285418; }
        .bedrock { background: #222222; border: 1px solid #111111; }

        /* Ores */
        .coal { background: radial-gradient(circle, #2a2a2a 40%, #737373 41%); border: 1px solid #525252; }
        .iron { background: radial-gradient(circle, #d8af93 40%, #737373 41%); border: 1px solid #525252; }
        .diamond { background: radial-gradient(circle, #4dedf2 40%, #737373 41%); border: 1px solid #525252; }
    </style>
</head>
<body>

    <h1>Hayat Games: Craft Edition</h1>
    <p class="instructions"><b>Click</b> to place blocks. Hold <b>Shift + Click</b> to mine/break blocks.</p>

    <!-- Hotbar / Inventory -->
    <div id="palette">
        <div class="block-wrapper">
            <div class="block-option grass selected" data-block="grass" title="Grass"></div>
            <span class="count" id="count-grass">64</span>
        </div>
        <div class="block-wrapper">
            <div class="block-option dirt" data-block="dirt" title="Dirt"></div>
            <span class="count" id="count-dirt">64</span>
        </div>
        <div class="block-wrapper">
            <div class="block-option planks" data-block="planks" title="Wooden Planks"></div>
            <span class="count" id="count-planks">32</span>
        </div>
        <div class="block-wrapper">
            <div class="block-option stone" data-block="stone" title="Stone"></div>
            <span class="count" id="count-stone">16</span>
        </div>
        <div class="block-wrapper">
            <div class="block-option wood" data-block="wood" title="Wood Log"></div>
            <span class="count" id="count-wood">10</span>
        </div>
        <div class="block-wrapper">
            <div class="block-option leaves" data-block="leaves" title="Leaves"></div>
            <span class="count" id="count-leaves">20</span>
        </div>
        <div class="block-wrapper">
            <div class="block-option diamond" data-block="diamond" title="Diamond Ore"></div>
            <span class="count" id="count-diamond">2</span>
        </div>
    </div>

    <!-- World Grid -->
    <div id="grid"></div>

    <script>
        const grid = document.getElementById('grid');
        const palette = document.getElementById('palette');
        let currentBlock = 'grass';

        // Inventory system values
        const inventory = {
            grass: 64, dirt: 64, planks: 32, stone: 16, wood: 10, leaves: 20, diamond: 2, sky: 999, bedrock: 0, coal: 0, iron: 0
        };

        // Synthesize instant synth game sounds
        function playSound(type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);

            if (type === 'place') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } else if (type === 'break') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.4, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                osc.start(); osc.stop(ctx.currentTime + 0.15);
            }
        }

        // Handle Hotbar Selection
        palette.addEventListener('click', (e) => {
            if (e.target.classList.contains('block-option')) {
                document.querySelectorAll('.block-option').forEach(opt => opt.classList.remove('selected'));
                e.target.classList.add('selected');
                currentBlock = e.target.getAttribute('data-block');
            }
        });

        // Grid Dimensions
        const rows = 15;
        const cols = 20;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');

                // Procedural Terrain Generation
                if (r === 9) {
                    cell.classList.add('grass');
                } else if (r > 9 && r < 12) {
                    cell.classList.add('dirt');
                } else if (r >= 12 && r < 14) {
                    // Randomly seed ores underground
                    let rand = Math.random();
                    if (rand < 0.1) cell.classList.add('coal');
                    else if (rand < 0.18) cell.classList.add('iron');
                    else cell.classList.add('stone');
                } else if (r === 14) {
                    cell.classList.add('bedrock'); // Unbreakable bottom layer
                } else {
                    cell.classList.add('sky');
                }

                // Handle block placements and interactions
                cell.addEventListener('click', (e) => {
                    // Check if block is bedrock
                    if (cell.classList.contains('bedrock')) return;

                    if (e.shiftKey) {
                        // MINING MODE (Shift + Click)
                        let blockType = cell.className.replace('cell ', '');
                        if (blockType !== 'sky') {
                            if (inventory[blockType] !== undefined) {
                                inventory[blockType]++;
                                let counter = document.getElementById(`count-${blockType}`);
                                if (counter) counter.innerText = inventory[blockType];
                            }
                            cell.className = 'cell sky';
                            playSound('break');
                        }
                    } else {
                        // PLACING MODE
                        if (cell.classList.contains('sky')) {
                            if (inventory[currentBlock] > 0) {
                                inventory[currentBlock]--;
                                let counter = document.getElementById(`count-${currentBlock}`);
                                if (counter) counter.innerText = inventory[currentBlock];

                                cell.className = 'cell ' + currentBlock;
                                playSound('place');
                            }
                        }
                    }
                });

                grid.appendChild(cell);
            }
        }
    </script>
</body>
</html>
