<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Math Challenge</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #3a7bd5, #3a6073, #9733ee, #da22ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            transition: all 0.3s ease;
        }

        .sub-header {
            color: #ff4081;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        h1 {
            color: #4338ca;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .tagline {
            color: #6b7280;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Grade Selection Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .btn-grade {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-grade:hover {
            background: #eff6ff;
            border-color: #3b82f6;
            color: #2563eb;
            transform: translateY(-2px);
        }

        /* Game Arena Screen */
        .hidden {
            display: none;
        }

        .game-box {
            margin-top: 20px;
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 25px;
            min-height: 40px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        .input-field:focus {
            border-color: #4338ca;
        }

        .btn-action {
            width: 100%;
            background: #4338ca;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 10px;
        }

        .btn-action:hover {
            background: #3730a3;
        }

        .btn-back {
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: underline;
        }

        .score-tracker {
            margin-top: 20px;
            font-weight: 600;
            color: #059669;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sub-header">MADE BY MUHAMMAD HAYAT RAJPUT</div>
        <h1>Math Quest</h1>

        <!-- Screen 1: Dashboard -->
        <div id="dashboard-screen">
            <p class="tagline">Test your skills across levels</p>
            <p style="color: #475569; font-weight: 500;">Select a grade to begin:</p>
            <div class="grid">
                <button class="btn-grade" onclick="startQuiz(1)">1</button>
                <button class="btn-grade" onclick="startQuiz(2)">2</button>
                <button class="btn-grade" onclick="startQuiz(3)">3</button>
                <button class="btn-grade" onclick="startQuiz(4)">4</button>
                <button class="btn-grade" onclick="startQuiz(5)">5</button>
                <button class="btn-grade" onclick="startQuiz(6)">6</button>
                <button class="btn-grade" onclick="startQuiz(7)">7</button>
                <button class="btn-grade" onclick="startQuiz(8)">8</button>
            </div>
        </div>

        <!-- Screen 2: Game Arena -->
        <div id="game-screen" class="hidden">
            <p class="tagline" id="grade-title">Grade 1 Challenge</p>

            <div class="game-box">
                <div class="question-text" id="question-display">What is 5 + 3?</div>
                <input type="number" id="user-input" class="input-field" placeholder="Your answer..." step="any" onkeydown="if(event.key==='Enter') checkAnswer()">
                <button class="btn-action" onclick="checkAnswer()">Submit Answer</button>
                <button class="btn-back" onclick="goToDashboard()">← Back to Grades</button>
            </div>

            <div class="score-tracker">Streak: <span id="streak-count">0</span> 🔥</div>
        </div>
    </div>

    <script>
        let currentQuestionObj = null;
        let selectedGrade = 1;
        let streak = 0;

        // Core dynamic question generation logic
        function generateQuestion(grade) {
            let num1, num2, operator, questionText, correctAnswer;

            switch(parseInt(grade)) {
                case 1: // Grade 1: Simple Addition (1 to 10)
                    num1 = Math.floor(Math.random() * 10) + 1;
                    num2 = Math.floor(Math.random() * 10) + 1;
                    questionText = `What is ${num1} + ${num2}?`;
                    correctAnswer = num1 + num2;
                    break;

                case 2: // Grade 2: Subtraction (Result is positive)
                    num1 = Math.floor(Math.random() * 15) + 6;
                    num2 = Math.floor(Math.random() * 5) + 1;
                    questionText = `What is ${num1} - ${num2}?`;
                    correctAnswer = num1 - num2;
                    break;

                case 3: // Grade 3: Single-digit Multiplication
                    num1 = Math.floor(Math.random() * 10) + 1;
                    num2 = Math.floor(Math.random() * 10) + 1;
                    questionText = `What is ${num1} × ${num2}?`;
                    correctAnswer = num1 * num2;
                    break;

                case 4: // Grade 4: Larger Additions and Subtractions
                    num1 = Math.floor(Math.random() * 90) + 10;
                    num2 = Math.floor(Math.random() * 90) + 10;
                    operator = Math.random() > 0.5 ? '+' : '-';
                    if (operator === '-' && num1 < num2) { [num1, num2] = [num2, num1]; } // Keep positive
                    questionText = `What is ${num1} ${operator} ${num2}?`;
                    correctAnswer = operator === '+' ? num1 + num2 : num1 - num2;
                    break;

                case 5: // Grade 5: Even Division Loops
                    num2 = Math.floor(Math.random() * 9) + 2;
                    correctAnswer = Math.floor(Math.random() * 10) + 1;
                    num1 = num2 * correctAnswer; // guarantees whole numbers
                    questionText = `What is ${num1} ÷ ${num2}?`;
                    break;

                case 6: // Grade 6: Basic Decimals (1 decimal place)
                    num1 = parseFloat((Math.random() * 5 + 1).toFixed(1));
                    num2 = parseFloat((Math.random() * 5 + 1).toFixed(1));
                    questionText = `What is ${num1} + ${num2}?`;
                    correctAnswer = parseFloat((num1 + num2).toFixed(1));
                    break;

                case 7: // Grade 7: Linear Variable equations (Solve for X)
                    let coefficient = Math.floor(Math.random() * 4) + 2; // 2 to 5
                    correctAnswer = Math.floor(Math.random() * 9) + 2; // 2 to 10
                    let total = coefficient * correctAnswer;
                    questionText = `If ${coefficient}x = ${total}, what is x?`;
                    break;

                case 8: // Grade 8: Simple Powers / Exponents
                    num1 = Math.floor(Math.random() * 10) + 2;
                    questionText = `What is ${num1}² (squared)?`;
                    correctAnswer = num1 * num1;
                    break;

                default:
                    questionText = "What is 2 + 2?";
                    correctAnswer = 4;
            }

            return { question: questionText, answer: correctAnswer };
        }

        // Navigation and UI interactions
        function startQuiz(grade) {
            selectedGrade = grade;
            streak = 0;
            document.getElementById('streak-count').innerText = streak;
            document.getElementById('grade-title').innerText = `Grade ${grade} Challenge`;

            document.getElementById('dashboard-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            loadNextQuestion();
        }

        function loadNextQuestion() {
            currentQuestionObj = generateQuestion(selectedGrade);
            document.getElementById('question-display').innerText = currentQuestionObj.question;

            const inputField = document.getElementById('user-input');
            inputField.value = '';
            inputField.focus();
        }

        function checkAnswer() {
            const userInput = document.getElementById('user-input').value;
            if(userInput.trim() === "") return; // Don't submit empty fields

            const userAnswer = parseFloat(userInput);

            if (userAnswer === currentQuestionObj.answer) {
                streak++;
                document.getElementById('streak-count').innerText = streak;
                alert("Correct! Perfect score update.");
                loadNextQuestion(); // Keeps spinning endless questions
            } else {
                streak = 0;
                document.getElementById('streak-count').innerText = streak;
                alert(`Not quite! The correct answer was ${currentQuestionObj.answer}. Try another!`);
                loadNextQuestion();
            }
        }

        function goToDashboard() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
